<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>にこにこちゃんねる™ - アンケート＆寄付フォーム</title>
  <link rel="icon" href="https://img.icons8.com/color/1200/google-classroom.jpg">
  <style>
    :root {
      --bg-body: #eaeaea;
      --bg-card: #fff;
      --text-main: #333;
      --border-color: #4a90e2;
    }
    body {
      font-family: 'Arial', sans-serif;
      line-height: 1.6;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: var(--bg-body);
      color: var(--text-main);
      position: relative;
      min-height: 90vh;
    }
    .form-container {
      background: var(--bg-card);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #4a90e2;
      margin-bottom: 20px;
      font-size: 1.8rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    textarea {
      resize: vertical;
      height: 100px;
    }
    .radio-group {
      display: flex;
      gap: 15px;
      margin-top: 5px;
    }
    .btn-submit {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-submit:hover {
      background-color: #357ab8;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #777;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }

    .secret-btn {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 40px;
      height: 40px;
      background: transparent;
      border: none;
      outline: none;
      cursor: default;
      opacity: 0;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h1>リンク寄付・アンケートフォーム</h1>
    <p style="font-size: 0.9rem; color: #666; text-align: center; margin-bottom: 25px;">
      新しく見つけたプロキシサイトや、運営への要望を教えてください！
    </p>

    <form action="submit.php" method="POST">
      <div class="form-group">
        <label>1. 今回の目的を選んでください</label>
        <select name="purpose" required>
          <option value="リンクの寄付（プロキシ・動画・ゲームなど）">新リンクの寄付</option>
          <option value="バグ報告・リンク切れの報告">バグ・リンク切れ報告</option>
          <option value="運営への要望・メッセージ">運営への要望・メッセージ</option>
        </select>
      </div>

      <div class="form-group">
        <label>2. サイトのタイトル（リンク寄付の場合）</label>
        <input type="text" name="siteTitle" placeholder="例: 新わかめTube、◯◯プロキシ">
      </div>

      <div class="form-group">
        <label>3. サイトのURL（リンク寄付の場合）</label>
        <input type="text" name="siteUrl" placeholder="https://...">
      </div>

      <div class="form-group">
        <label>4. 川崎市（ISGCなど）で使えた?</label>
        <div class="radio-group">
          <label><input type="radio" name="isgc" value="使えた" checked> 使えた</label>
          <label><input type="radio" name="isgc" value="使えなかった"> 使えなかった</label>
          <label><input type="radio" name="isgc" value="わからない/試してない"> わからない</label>
        </div>
      </div>

      <div class="form-group">
        <label>5. 詳しい説明や、運営へのメッセージ</label>
        <textarea name="message" placeholder="使い方のコツや、その他連絡したいことを自由に書いてね"></textarea>
      </div>

      <button type="submit" class="btn-submit">🚀 送信する</button>
    </form>

    <a href="#" class="back-link" onclick="window.history.back(); return false;">← もどる</a>
  </div>

  <button class="secret-btn" onclick="goToAdmin()"></button>

  <script>
    function goToAdmin() {
      const password = prompt("パスワードを入力してください:");
      if (password) {
        // パスワードを付けたURLへ移動
        window.location.href = "submit.php?pw=" + encodeURIComponent(password);
      }
    }
  </script>
</body>
</html>
